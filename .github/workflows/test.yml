name: Scaffold Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ '21' ]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Install Clojure CLI
        uses: DeLaGuardo/setup-clojure@3fe9b3ae632c6758d0b7757b0838606ef4287b08 # 13.4
        with:
          cli: 'latest'

      - name: Cache Clojure dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-deps-${{ hashFiles('deps.edn') }}
          restore-keys: ${{ runner.os }}-deps-

      - name: Pre-fetch Clojure deps
        run: clojure -P -M:test

      - name: Install Playwright browsers
        run: java -cp "$(clojure -A:test -Spath)" com.microsoft.playwright.CLI install --with-deps chromium

      - name: Run JVM tests
        run: clojure -M:test:spec

      - name: Run ClojureScript tests
        run: clojure -M:test:cljs once

      - name: Compile CSS
        run: clojure -M:test:css once
