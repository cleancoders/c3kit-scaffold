name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Clojure CLI
        uses: DeLaGuardo/setup-clojure@4c7a6f613e5089821bb3bb2a33a3ee115578580d # 13.6.1
        with:
          cli: 'latest'

      - name: Cache Clojure dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-deps-${{ hashFiles('deps.edn') }}
          restore-keys: ${{ runner.os }}-deps-

      - name: Pre-fetch Clojure deps
        run: clojure -P -M:test

      - name: Install Playwright browsers
        run: java -cp "$(clojure -A:test -Spath)" com.microsoft.playwright.CLI install --with-deps chromium

      - name: Run JVM tests
        run: clojure -M:test:spec

      - name: Run ClojureScript tests
        run: clojure -M:test:cljs once

      - name: Compile CSS
        run: clojure -M:test:css once

  security:
    uses: cleancoders/github-actions/.github/workflows/security.yml@v1
    with:
      src-paths: "src"
      clj-watson-blocking: true
      semgrep-blocking: true
